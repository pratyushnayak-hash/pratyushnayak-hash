<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" rx="15" fill="url(#bg-gradient)"/>
  
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>

  <rect x="5" y="5" width="790" height="190" rx="10" stroke="#334155" stroke-width="2" fill="none"/>

  <text x="40" y="65" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#text-gradient)">
    Hi, I'm Pratyush Nayak 👋
  </text>
  
  <text x="40" y="100" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#94a3b8">
    B.Tech Computer Science & Engineering Student | AI & ML Enthusiast
  </text>

  <g transform="translate(40, 130)">
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#374151"/>
    <text x="40" y="20" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#38bdf8" text-anchor="middle">Python</text>

    <rect x="90" y="0" width="70" height="30" rx="6" fill="#374151"/>
    <text x="125" y="20" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#fb923c" text-anchor="middle">Java</text>

    <rect x="170" y="0" width="70" height="30" rx="6" fill="#374151"/>
    <text x="205" y="20" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#4ade80" text-anchor="middle">DSA</text>

    <rect x="250" y="0" width="90" height="30" rx="6" fill="#374151"/>
    <text x="295" y="20" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="bold" fill="#f43f5e" text-anchor="middle">Web Dev</text>
  </g>

  <g transform="translate(650, 40)" stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.6">
    <circle cx="50" cy="50" r="30" stroke-dasharray="5,5"/>
    <circle cx="50" cy="50" r="15"/>
    <path d="M 20,50 L 0,50 M 80,50 L 100,50 M 50,20 L 50,0 M 50,80 L 50,100"/>
  </g>
</svg>
